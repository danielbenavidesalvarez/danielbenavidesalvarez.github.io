<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>D3 Project</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Slacking on Cleaning</h1>
    <p class="subtitle">An analysis on my roommate! Click a day to inspect what utensils were left dirty. Hover items for drop times.</p>
  </header>

  <section class="controls">
    
    <label for="girlfriendFilter">Who was home?:</label>
    <div id="girlfriendFilter" class="gf-controls" role="tablist" aria-label="Girlfriend presence filter">
      <button id="gfNo" class="gf-btn" data-value="No" title="Only my roommate was home">👨</button>
      <button id="gfYes" class="gf-btn" data-value="Yes" title="Girlfriend is home">👩</button>
      <button id="gfAll" class="gf-btn active" data-value="All" title="Show all data">👨👩</button>
    </div>
    <button id="backToCalendar" style="display:none;">Back to calendar</button>
    <div id="legend">
      <span>Less</span>
      <div class="legend-gradient"></div>
      <span>More</span>
    </div>
  </section>

  <main>
    <div id="calendar"></div>
    <div id="detail" style="display:none;"></div>
  </main>

  <div id="tooltip" class="tooltip" style="opacity:0; position:absolute;"></div>

  <!-- D3 v7 CDN -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <!-- data scripts -->
  <script src="js/data.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
